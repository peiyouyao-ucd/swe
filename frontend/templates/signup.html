{% extends "base.html" %}

{% block title %}Sign Up | DublinBikes{% endblock %}

{% block content %}
<div class="login-page-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo-circle">
                <i class="fa-solid fa-bicycle"></i>
            </div>
            <h2>Create Your Account</h2>
            <p>Join thousands of cyclists in Dublin</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn" onclick="location.href='{{ url_for('auth.login') }}'">Login</button>
            <button class="tab-btn active">Sign Up</button>
        </div>

        <div class="social-login-grid">
            <button class="btn-social">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> 
                Continue with Google
            </button>
            <button class="btn-social">
                <i class="fa-brands fa-apple"></i> Continue with Apple
            </button>
        </div>

        <div class="login-separator">Or continue with email</div>

        <form action="{{ url_for('auth.signup') }}" method="POST" class="login-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-icon-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" name="full_name" placeholder="Sarah O'Connor" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="email" placeholder="sarah@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock"></i> <input type="password" name="password" id="password" placeholder="••••••••" required>

                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login-submit">Create Account</button>
        </form>

        <div class="login-footer">
            <p class="terms-text">By signing up, you agree to our <a href="{{ url_for('pages.howto') }}?tab=terms-content">Terms</a> and <a href="{{ url_for('pages.howto') }}?tab=terms-content">Privacy</a></p>
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
