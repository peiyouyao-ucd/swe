{% extends "base.html" %}

{% block title %}Login | DublinBikes{% endblock %}

{% block content %}
<div class="login-page-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo-circle">
                <i class="fa-solid fa-bicycle"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your dashboard</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active">Login</button>
            <button class="tab-btn" onclick="location.href='{{ url_for('auth.signup') }}'">Sign Up</button>
        </div>

        <div class="social-login-grid">
            <button class="btn-social">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> 
                Continue with Google
            </button>
            <button class="btn-social">
                <i class="fa-brands fa-apple"></i> Continue with Apple
            </button>
        </div>

        <div class="login-separator">Or continue with email</div>

        <form action="{{ url_for('auth.login') }}" method="POST" class="login-form">
            {% if error %}
                <div class="error-message" style="color: #ef4444; background-color: #fee2e2; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; border: 1px solid #fecaca;">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                </div>
            {% endif %}
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" name="username" placeholder="your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="label-with-link">
                    <label>Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock"></i> <input type="password" name="password" id="password" placeholder="••••••••" required>

                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login-submit">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up now</a></p>
        </div>
    </div>
</div>
{% endblock %}
